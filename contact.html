<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio | Contact</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* === Base Styles === */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0a0a0a 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: #00b3ff;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 20px rgba(0, 179, 255, 0.3);
      padding: 15px 40px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo a {
    font-weight: bold;
    font-size: 1.2rem;
    background: #00aaff;
    color: #000;
    padding: 0.3rem 0.7rem;
    border-radius: 5px;
    box-shadow: 0 5px 20px rgba(0, 170, 255, 0.7);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: #fff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #00b3ff;
      text-shadow: 0 0 10px #00b3ff;
    }

    /* === Contact Section === */
    .contact-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 40px 20px;
    }

    .contact-section h1 {
      font-size: 2.5rem;
      color: #00b3ff;
      text-shadow: 0 0 15px #00b3ff;
      margin-bottom: 15px;
    }

    .contact-section p {
      font-size: 1.1rem;
      margin-bottom: 40px;
      color: #bbb;
    }

    form {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 179, 255, 0.3);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      backdrop-filter: blur(10px);
    }

    input, textarea, button {
      font-family: inherit;
      border: none;
      outline: none;
      border-radius: 8px;
      padding: 12px 15px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 10px #00b3ff;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      background: #00b3ff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #009de0;
      box-shadow: 0 0 15px #00b3ff;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      color: #888;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* === Responsive === */
    @media (max-width: 600px) {
      .nav-links {
        flex-direction: column;
        align-items: center;
      }
      .contact-section h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <div class="logo"><a href="index.html">E-PORTFOLIO</a></div>
      <ul class="nav-links">
        <li><a href="about.html">About Me</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact-section">
    <h1>Contact Me</h1>
    <p>Got a project or idea? Let’s connect — I’d love to hear from you.</p>

    <form action="https://formsubmit.co/rn7nautiyal555@gmail.com" method="POST">
      <!-- Disable captcha & redirect after submission -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="thankyou.html">

      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>© 2025 My Portfolio | Built with ⚡ Passion & Code</p>
  </footer>
</body>
</html>
